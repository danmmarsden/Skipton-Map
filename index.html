<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skipton commute map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    html, body { height: 100%; margin: 0; }
    body.locked { overflow: hidden; }
    body.locked #map,
    body.locked .status,
    body.locked .filter-panel,
    body.locked .legend {
      visibility: hidden;
    }
    #map { height: 100vh; width: 100vw; }
    .password-gateway {
      position: fixed; inset: 0; z-index: 10000; display: none;
      align-items: center; justify-content: center; padding: 24px;
      background: #f4f6f8; font-family: Arial, sans-serif;
    }
    body.locked .password-gateway { display: flex; }
    .password-box {
      width: min(360px, 100%); background: #fff; border: 1px solid rgba(0,0,0,.15);
      border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,.16); padding: 22px;
    }
    .password-box h1 { margin: 0 0 18px 0; font-size: 20px; line-height: 1.2; }
    .password-box label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .password-box input {
      width: 100%; box-sizing: border-box; border: 1px solid rgba(0,0,0,.28);
      border-radius: 6px; padding: 10px 11px; font: inherit;
    }
    .password-box button {
      width: 100%; border: 0; border-radius: 6px; background: #1f77b4; color: #fff;
      margin-top: 12px; padding: 10px 12px; font: inherit; font-weight: 700; cursor: pointer;
    }
    .password-box button:hover { background: #195f90; }
    .password-error { min-height: 18px; margin-top: 10px; color: #b00020; font-size: 13px; }
    .legend {
      position: fixed; bottom: 24px; left: 24px; z-index: 9999;
      background: #fff; border: 1px solid rgba(0,0,0,.2); border-radius: 10px;
      padding: 10px 12px; box-shadow: 0 4px 14px rgba(0,0,0,.15);
      font-family: Arial, sans-serif; font-size: 14px; line-height: 1.35;
    }
    .legend h3 { margin: 0 0 8px 0; font-size: 15px; }
    .legend-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .legend-badge {
      width: 16px; height: 16px; border-radius: 50%; display: inline-flex;
      align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 700;
      flex: 0 0 16px;
    }
    .single { background: #1f77b4; }
    .shared { background: #2ca02c; }
    .site { background: #d62728; }
    .status {
      position: fixed; top: 12px; left: 12px; z-index: 9999; background: rgba(255,255,255,.95);
      border: 1px solid rgba(0,0,0,.15); border-radius: 10px; padding: 10px 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,.12); font-family: Arial, sans-serif; font-size: 14px;
      min-width: 260px;
    }
    .status .small { color: #555; font-size: 12px; margin-top: 4px; }
    .filter-panel {
      position: fixed; top: 12px; right: 12px; z-index: 9999; width: 300px;
      background: rgba(255,255,255,.95); border: 1px solid rgba(0,0,0,.15); border-radius: 10px;
      padding: 10px 12px; box-shadow: 0 4px 14px rgba(0,0,0,.12);
      font-family: Arial, sans-serif; font-size: 14px;
    }
    .filter-panel label { display: block; font-weight: 700; margin-bottom: 6px; }
    .filter-row { display: flex; gap: 8px; }
    .filter-row input {
      min-width: 0; flex: 1; border: 1px solid rgba(0,0,0,.25); border-radius: 6px;
      padding: 8px 9px; font: inherit;
    }
    .filter-row button {
      border: 1px solid rgba(0,0,0,.25); border-radius: 6px; background: #f7f7f7;
      padding: 8px 10px; font: inherit; cursor: pointer;
    }
    .filter-row button:hover { background: #ececec; }
    .count-badge {
      width: 34px; height: 34px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; color: white; font-weight: 700;
      border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.35);
    }
    .count-badge.single { background: #1f77b4; }
    .count-badge.shared { background: #2ca02c; }
    .popup-list { max-height: 180px; overflow: auto; padding-left: 18px; margin: 8px 0 0 0; }
    .popup-list li { margin-bottom: 6px; }
    .popup-meta { color: #555; margin-top: 4px; font-size: 12px; }
    @media (max-width: 720px) {
      .status { left: 12px; right: 12px; min-width: 0; }
      .filter-panel { top: 86px; left: 12px; right: 12px; width: auto; }
      .legend { left: 12px; right: 12px; bottom: 12px; }
    }
  </style>
</head>
<body class="locked">
<div id="password-gateway" class="password-gateway">
  <form id="password-form" class="password-box">
    <h1>Skipton commute map</h1>
    <label for="map-password">Password</label>
    <input id="map-password" type="password" autocomplete="current-password" />
    <button type="submit">Enter</button>
    <div id="password-error" class="password-error" aria-live="polite"></div>
  </form>
</div>
<div id="map"></div>
<div class="status" id="status"><strong>Loading map…</strong><div class="small" id="status-small">Resolving full postcodes where possible.</div></div>
<div class="filter-panel">
  <label for="name-filter">Name filter</label>
  <div class="filter-row">
    <input id="name-filter" type="search" placeholder="Type a name" autocomplete="off" />
    <button id="clear-filter" type="button">Clear</button>
  </div>
</div>
<div class="legend">
  <h3>Legend</h3>
  <div class="legend-row"><span class="legend-badge site">S</span><span>The Bailey, Skipton, North Yorkshire, BD23 1DN</span></div>
  <div class="legend-row"><span class="legend-badge single">1</span><span>Single colleague location</span></div>
  <div class="legend-row"><span class="legend-badge shared">2+</span><span>Shared postcode location</span></div>
  <div class="legend-row"><span style="width:16px;height:16px;border-radius:50%;border:2px solid #1f77b4;display:inline-block;"></span><span>30 mile radius</span></div>
  <div class="legend-row"><span style="width:16px;height:16px;border-radius:50%;border:2px solid #2ca02c;display:inline-block;"></span><span>40 mile radius</span></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const MAP_DATA_URL = 'map-data.js';
const skiptonAddress = 'The Bailey, Skipton, North Yorkshire, BD23 1DN';
const skipton = [53.965155, -2.010308];
const map = L.map('map').setView(skipton, 6);
const MAP_PASSWORD = 'Skipton2026!';
const PASSWORD_SESSION_KEY = 'skipton-map-access-granted';

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

L.marker(skipton, { title: skiptonAddress })
  .addTo(map)
  .bindPopup(`<strong>${escapeHtml(skiptonAddress)}</strong>`);

L.circle(skipton, { radius: 30 * 1609.34, color: '#1f77b4', weight: 2, fill: false }).addTo(map);
const radius40Circle = L.circle(skipton, { radius: 40 * 1609.34, color: '#2ca02c', weight: 2, fill: false }).addTo(map);
const markerLayer = L.layerGroup().addTo(map);
const passwordGateway = document.getElementById('password-gateway');
const passwordForm = document.getElementById('password-form');
const passwordInput = document.getElementById('map-password');
const passwordError = document.getElementById('password-error');
const nameFilterInput = document.getElementById('name-filter');
const clearFilterButton = document.getElementById('clear-filter');
let data = [];
let districtCentroids = {};
let fullPostcodeLocations = {};
let resolvedLocations = [];
let mapStats = null;
let mapDataPromise = null;
let mapInitialised = false;

function hasStoredAccess() {
  try {
    return sessionStorage.getItem(PASSWORD_SESSION_KEY) === 'true';
  } catch (e) {
    return false;
  }
}
function storeAccess() {
  try {
    sessionStorage.setItem(PASSWORD_SESSION_KEY, 'true');
  } catch (e) {
    // Continue without persistence if browser storage is unavailable.
  }
}
function applyMapData(source) {
  data = source.colleagues || [];
  districtCentroids = source.districtCentroids || {};
  fullPostcodeLocations = source.fullPostcodeLocations || {};
}
function loadMapData() {
  if (window.skiptonMapData) {
    applyMapData(window.skiptonMapData);
    return Promise.resolve();
  }
  if (mapDataPromise) return mapDataPromise;

  mapDataPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = MAP_DATA_URL;
    script.async = true;
    script.onload = () => {
      if (!window.skiptonMapData) {
        reject(new Error('Map data file loaded without data'));
        return;
      }

      applyMapData(window.skiptonMapData);
      resolve();
    };
    script.onerror = () => reject(new Error('Map data could not be loaded'));
    document.head.appendChild(script);
  });

  return mapDataPromise;
}
async function unlockMap() {
  passwordError.textContent = 'Loading map data...';
  await loadMapData();
  document.body.classList.remove('locked');
  passwordGateway.hidden = true;
  storeAccess();
  passwordError.textContent = '';
  if (!mapInitialised) {
    await initialiseMap();
    mapInitialised = true;
  }
  setTimeout(() => map.invalidateSize(), 0);
}
if (hasStoredAccess()) {
  unlockMap().catch(err => {
    console.error(err);
    passwordError.textContent = 'Map data could not be loaded';
  });
} else {
  setTimeout(() => passwordInput.focus(), 0);
}
passwordForm.addEventListener('submit', event => {
  event.preventDefault();
  if (passwordInput.value === MAP_PASSWORD) {
    unlockMap().catch(err => {
      console.error(err);
      passwordError.textContent = 'Map data could not be loaded';
    });
    return;
  }

  passwordError.textContent = 'Incorrect password';
  passwordInput.select();
});

function isFullPostcode(pc) {
  return /^[A-Z]{1,2}\d[A-Z\d]?\s?\d[A-Z]{2}$/.test(pc || '');
}
function outwardCode(pc) {
  if (!pc) return null;
  const compact = pc.replace(/\s+/g, '');
  const m = compact.match(/^([A-Z]{1,2}\d[A-Z\d]?)(\d[A-Z]{2})$/);
  return m ? m[1] : compact;
}
function makeIcon(count, shared) {
  const cls = shared ? 'shared' : 'single';
  const label = shared ? String(count) : '1';
  return L.divIcon({
    className: '',
    html: `<div class="count-badge ${cls}">${label}</div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 17]
  });
}
function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}
function popupHtml(group) {
  const title = escapeHtml(group[0].postcode || 'No postcode');
  const shared = group.length > 1;
  const names = group.map(r => {
    const details = [];
    if (r.role) details.push(escapeHtml(r.role));
    if (r.commute != null) details.push(`${r.commute} hr commute`);
    if (r.owner) details.push(`Owner: ${escapeHtml(r.owner)}`);
    if (r.outcome) details.push(`Outcome: ${escapeHtml(r.outcome)}`);

    const meta = details.length ? `<div class="popup-meta">${details.join(' | ')}</div>` : '';
    return `<li><strong>${escapeHtml(r.name)}</strong>${meta}</li>`;
  }).join('');
  return `
    <strong>${title}</strong><br>
    ${shared ? '<em>Shared location</em><br>' : ''}
    <div class="popup-meta">${group.length} colleague${group.length === 1 ? '' : 's'}</div>
    <ul class="popup-list">${names}</ul>
  `;
}
async function geocodeFullPostcode(pc) {
  const cached = fullPostcodeLocations[(pc || '').toUpperCase()];
  if (cached) return cached;

  const url = 'https://api.postcodes.io/postcodes/' + encodeURIComponent(pc);
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const body = await res.json();
  if (!body || !body.result) throw new Error('No geocode result');
  return [body.result.latitude, body.result.longitude];
}
async function resolveLocations() {
  const byPostcode = new Map();
  const missingPostcode = data.filter(row => !row.postcode).length;
  for (const row of data) {
    if (!row.postcode) continue;
    if (!byPostcode.has(row.postcode)) byPostcode.set(row.postcode, []);
    byPostcode.get(row.postcode).push(row);
  }

  let placed = 0;
  let geocodedFull = 0;
  let fallbackDistrict = 0;
  let skipped = 0;
  const locations = [];

  for (const [pc, group] of byPostcode.entries()) {
    let coords = null;

    if (isFullPostcode(pc)) {
      try {
        coords = await geocodeFullPostcode(pc);
        geocodedFull += 1;
      } catch (e) {
        const out = outwardCode(pc);
        if (districtCentroids[out]) {
          coords = districtCentroids[out];
          fallbackDistrict += 1;
        }
      }
    } else {
      const out = outwardCode(pc);
      if (districtCentroids[out]) {
        coords = districtCentroids[out];
        fallbackDistrict += 1;
      }
    }

    if (!coords) {
      skipped += group.length;
      continue;
    }

    locations.push({ pc, group, coords });
    placed += group.length;
  }

  return {
    locations,
    stats: { placed, geocodedFull, fallbackDistrict, missingPostcode, skipped }
  };
}
function matchingRows(query) {
  const normalized = query.trim().toLowerCase();
  if (!normalized) return data;
  return data.filter(row => row.name.toLowerCase().includes(normalized));
}
function renderMarkers(query) {
  markerLayer.clearLayers();

  const normalized = query.trim().toLowerCase();
  const matching = matchingRows(query);
  const bounds = radius40Circle.getBounds();
  let placed = 0;

  for (const location of resolvedLocations) {
    const group = normalized
      ? location.group.filter(row => row.name.toLowerCase().includes(normalized))
      : location.group;

    if (!group.length) continue;

    const shared = group.length > 1;
    const marker = L.marker(location.coords, {
      icon: makeIcon(group.length, shared),
      title: shared ? `${location.pc} (shared by ${group.length} colleagues)` : group[0].name
    }).addTo(markerLayer);

    marker.bindPopup(popupHtml(group));
    marker.bindTooltip(shared
      ? `${escapeHtml(location.pc)} — shared by ${group.length} colleagues`
      : escapeHtml(group[0].name));

    bounds.extend(location.coords);
    placed += group.length;
  }

  map.fitBounds(bounds, { padding: [30, 30] });
  updateStatus(placed, matching.length, query);
}
function updateStatus(placed, matchingCount, query) {
  const { skipped, missingPostcode, geocodedFull, fallbackDistrict } = mapStats || {
    skipped: 0,
    missingPostcode: 0,
    geocodedFull: 0,
    fallbackDistrict: 0
  };
  const totalSkipped = skipped + missingPostcode;
  const missingText = missingPostcode
    ? ` ${missingPostcode} missing postcode${missingPostcode === 1 ? '' : 's'}.`
    : '';

  if (query.trim()) {
    const skippedMatches = matchingCount - placed;
    const skippedText = skippedMatches
      ? ` ${skippedMatches} matching row${skippedMatches === 1 ? '' : 's'} skipped because no postcode could be plotted.`
      : '';

    document.getElementById('status').innerHTML =
      `<strong>Filter applied</strong><div class="small">${placed} plottable colleague${placed === 1 ? '' : 's'} shown for "${escapeHtml(query.trim())}".${skippedText} SBS and radius circles remain visible.</div>`;
    return;
  }

  document.getElementById('status').innerHTML =
    `<strong>Map loaded</strong><div class="small">${placed} colleague marker${placed === 1 ? '' : 's'} placed. ${geocodedFull} full postcode${geocodedFull === 1 ? '' : 's'} resolved precisely. ${fallbackDistrict} district fallback${fallbackDistrict === 1 ? '' : 's'} used. ${totalSkipped} row${totalSkipped === 1 ? '' : 's'} skipped.${missingText}</div>`;
}
async function initialiseMap() {
  const result = await resolveLocations();
  resolvedLocations = result.locations;
  mapStats = result.stats;
  renderMarkers(nameFilterInput.value);
}
nameFilterInput.addEventListener('input', () => renderMarkers(nameFilterInput.value));
clearFilterButton.addEventListener('click', () => {
  nameFilterInput.value = '';
  nameFilterInput.focus();
  renderMarkers('');
});
</script>
</body>
</html>
